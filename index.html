<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>頌缽療癒 Singing Bowl</title>
  <meta name="description" content="頌缽療癒網頁，介紹頌缽聲音、放鬆與冥想體驗。" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7efe2;
      --card: rgba(255, 255, 255, 0.72);
      --text: #2f2418;
      --muted: #745f48;
      --gold: #b88937;
      --deep: #6b3f1d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #fff8ea 0%, var(--bg) 45%, #ead7bd 100%);
      min-height: 100vh;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }
    .hero {
      width: min(980px, 100%);
      padding: clamp(32px, 7vw, 72px);
      border: 1px solid rgba(184, 137, 55, .28);
      border-radius: 32px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(80, 50, 18, .18);
      backdrop-filter: blur(10px);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: -120px auto auto 50%;
      width: 360px;
      height: 360px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(212, 167, 78, .36), transparent 68%);
      pointer-events: none;
    }
    .bowl {
      width: 150px;
      height: 150px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 38%, #ffe7a6 0 18%, #c69235 19% 48%, #775022 49% 66%, transparent 67%),
                  radial-gradient(ellipse at center, #d8a13d, #7a4c21 68%, transparent 69%);
      box-shadow: inset 0 -18px 24px rgba(40, 22, 7, .28), 0 18px 45px rgba(110, 70, 24, .24);
      position: relative;
    }
    .bowl::after {
      content: "";
      position: absolute;
      left: 17%;
      right: 17%;
      bottom: 28px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255, 234, 170, .55);
    }
    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 5.4rem);
      letter-spacing: .08em;
      color: var(--deep);
    }
    .subtitle {
      margin: 18px auto 0;
      max-width: 700px;
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      line-height: 1.9;
      color: var(--muted);
    }
    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }
    a, .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }
    a {
      color: #fffaf0;
      background: linear-gradient(135deg, #c99a45, #7b4a1d);
      box-shadow: 0 10px 26px rgba(123, 74, 29, .22);
    }
    .tag {
      color: var(--deep);
      background: rgba(255, 255, 255, .64);
      border: 1px solid rgba(184, 137, 55, .3);
    }
    section {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 42px;
      text-align: left;
    }
    article {
      padding: 22px;
      border-radius: 22px;
      background: rgba(255, 255, 255, .58);
      border: 1px solid rgba(184, 137, 55, .2);
    }
    h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
      color: var(--deep);
    }
    p {
      margin: 0;
      line-height: 1.75;
      color: var(--muted);
    }
    footer {
      margin-top: 34px;
      color: rgba(47, 36, 24, .58);
      font-size: .95rem;
    }
    @media (max-width: 760px) {
      section { grid-template-columns: 1fr; }
      .hero { border-radius: 24px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div class="bowl" aria-hidden="true"></div>
      <h1>頌缽療癒</h1>
      <p class="subtitle">讓溫柔的聲波帶你慢下來，回到呼吸、身體與內在的安定。適合冥想、放鬆、睡前儀式與自我照顧。</p>
      <div class="actions">
        <a href="mailto:hello@example.com">預約體驗</a>
        <span class="tag">Singing Bowl Meditation</span>
      </div>
      <section aria-label="服務特色">
        <article>
          <h2>深度放鬆</h2>
          <p>以穩定而延展的泛音，引導身體釋放緊繃，讓心慢慢沉澱。</p>
        </article>
        <article>
          <h2>冥想陪伴</h2>
          <p>適合初學者與日常練習者，在聲音中建立更柔軟的專注。</p>
        </article>
        <article>
          <h2>身心照顧</h2>
          <p>為忙碌生活留下一段安靜時間，重新感受自己的節奏。</p>
        </article>
      </section>
      <footer>© 2026 Singing Bowl</footer>
    </div>
  </main>
</body>
</html>
